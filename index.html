<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vanilla JS Kanban</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app">
      <header class="app__header">
        <h1>Kanban Board</h1>
        <p>Minimal HTML, CSS, and vanilla JavaScript scaffold.</p>
      </header>

      <section class="board" aria-label="Kanban board">
        <article class="column">
          <div class="column__header">
            <h2>To Do</h2>
          </div>

          <div class="column__items">
            <div class="item">Sample task</div>
          </div>
        </article>
      </section>
    </main>

    <script src="./script.js"></script>
  </body>
</html>
